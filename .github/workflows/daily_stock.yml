name: 🚀 Daily Stock Pipeline

on:
  schedule:
    # Jam 17:00 WIB = 10:00 UTC, Senin-Jumat
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # tombol "Run manually" di GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Transactions Pipeline
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scripts/daily_transactions.py
